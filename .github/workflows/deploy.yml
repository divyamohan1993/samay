name: Deploy to Cloud Run

# Auto-deploy on every push to main. Keyless auth via Workload Identity Federation
# (no service-account JSON key stored anywhere); the WIF binding is locked to this
# exact repo. Cloud Build builds the Dockerfile from source and ships the revision.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "research/**"
      - "artifacts/**"
      - "runs/**"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write          # required for WIF OIDC token

concurrency:
  group: deploy-cloudrun
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (keyless, WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/107722137045/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@dmjone.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy samay \
            --source . \
            --project dmjone \
            --region asia-east1 \
            --allow-unauthenticated \
            --memory 1Gi --cpu 2 \
            --concurrency 8 --max-instances 3 --min-instances 0 --timeout 30 \
            --quiet \
            --set-env-vars "^@^PQCSCHED_CORS_ORIGINS=https://pqcsched.dmj.one,https://dmj.one"

      - name: Smoke test the new revision
        run: |
          URL=$(gcloud run services describe samay --region asia-east1 --project dmjone --format='value(status.url)')
          echo "Service URL: $URL"
          curl -fsS -m 30 "$URL/health" && echo
          curl -fsS -m 30 "$URL/health/ready" && echo
